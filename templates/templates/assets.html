<h2>Assets</h2>

<form action="/add_asset" method="POST">
    <input type="text" name="name" placeholder="Asset Name">
    <input type="text" name="category" placeholder="Category">
    <button type="submit">Add Asset</button>
</form>

<ul>
{% for asset in assets %}
    <li>{{ asset[1] }} - {{ asset[2] }}</li>
{% endfor %}
</ul>
